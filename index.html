<script>
const JSONBIN = {
  binId:  "69c4a667b7ec241ddca41266",
  key:    "$2a$10$V0UgVfQPCVrN5gRv5..ey.Nn4yRTegsL8Gd2.ELVhjWebU8ogAbv."
};

const BASE = "https://api.jsonbin.io/v3/b";
const LS_KEY = "ttc-data-v1";

window.cloudStorage = {
  isCloud: !!(JSONBIN.binId && JSONBIN.key),
  lastErr: null,

  async read() {
    const raw = localStorage.getItem(LS_KEY);
    const local = raw ? JSON.parse(raw) : null;
    if (!this.isCloud) return local;
    try {
      const r = await fetch(`${BASE}/${JSONBIN.binId}/latest`, {
        headers: { "X-Master-Key": JSONBIN.key, "X-Bin-Meta": "false" }
      });
      if (!r.ok) {
        const t = await r.text();
        this.lastErr = "JSONBin " + r.status + ": " + t.slice(0,120);
        return local;
      }
      const cloud = await r.json();
      this.lastErr = null;
      // Cloud is truth — but only if it has actual data (not the blank {} from setup)
      const hasCloudData = cloud && (
        (cloud.queue && cloud.queue.length > 0) ||
        (cloud.bookshelf && cloud.bookshelf.length > 0) ||
        cloud.currentRead != null
      );
      const hasLocalData = local && (
        (local.queue && local.queue.length > 0) ||
        (local.bookshelf && local.bookshelf.length > 0) ||
        local.currentRead != null
      );
      if (hasCloudData) {
        // Cloud has real data — always use it and update local cache
        localStorage.setItem(LS_KEY, JSON.stringify(cloud));
        return cloud;
      }
      // Cloud is empty — use local (preserves data on refresh even if cloud blank)
      return hasLocalData ? local : cloud;
    } catch(e) {
      this.lastErr = e.message;
      return local;
    }
  },

  async write(data) {
    // Save locally first so refresh always works
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    if (!this.isCloud) return;
    try {
      const r = await fetch(`${BASE}/${JSONBIN.binId}`, {
        method: "PUT",
        headers: {
          "X-Master-Key": JSONBIN.key,
          "Content-Type": "application/json",
          "X-Bin-Meta": "false"
        },
        body: JSON.stringify(data)
      });
      if (!r.ok) {
        const t = await r.text();
        this.lastErr = "JSONBin " + r.status + ": " + t.slice(0,120);
        throw new Error(this.lastErr);
      }
      this.lastErr = null;
    } catch(e) {
      if (!this.lastErr) this.lastErr = e.message;
      throw e;
    }
  }
};
</script>

// ─── Utilities ────────────────────────────────────────────────────────────────
async function fetchCover(title, author) {
  try {
    const q = encodeURIComponent((title + (author ? " " + author : "")).trim());
    const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=3&printType=books`);
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.items) return null;
    // Try each result until we find one with a cover
    for (const item of d.items) {
      const links = item.volumeInfo?.imageLinks;
      const url = links?.thumbnail || links?.smallThumbnail;
      if (url) return url.replace("http://", "https://").replace("&edge=curl","");
    }
    return null;
  } catch(e) { console.warn("Cover fetch failed:", e); return null; }
}

function countdown(startDate) {
  const start = new Date(startDate);
  const target = new Date(start.getTime() + 30*24*60*60*1000);
  const now = new Date();
  const daysLeft = Math.ceil((target - now)/(24*60*60*1000));
  const progress = Math.min(1, Math.max(0, (now-start)/(30*24*60*60*1000)));
  return { daysLeft, progress, overdue: daysLeft < 0, target };
}

function cdColor(daysLeft) {
  if (daysLeft > 20) return "#4A7C59";
  if (daysLeft > 10) return "#C9A030";
  if (daysLeft > 3)  return "#C4623A";
  return "#C4303A";
}

function Stars({ value, onChange, readonly=false, size=20 }) {
  const [hov, setHov] = useState(0);
  return (
    <div style={{display:"flex",gap:2,cursor:readonly?"default":"pointer"}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} style={{fontSize:size,color:s<=(hov||value||0)?"#C9A030":"#5A3A20",
          transition:"color .12s",opacity:s<=(hov||value||0)?1:0.28}}
          onMouseEnter={()=>!readonly&&setHov(s)} onMouseLeave={()=>!readonly&&setHov(0)}
          onClick={()=>!readonly&&onChange&&onChange(s===value?0:s)}>★</span>
      ))}
    </div>
  );
}

function Avg({ ratings={} }) {
  const v = Object.values(ratings).filter(x=>x>0);
  if (!v.length) return <span style={{color:"#6A4A30",fontSize:12}}>No ratings</span>;
  const a = (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1);
  return <span style={{color:"#C9A030",fontSize:13,fontWeight:600}}>★ {a}
    <span style={{color:"#8A6A40",fontWeight:400,fontSize:11}}> ({v.length})</span></span>;
}

function GenrePill({ genre, small=false, onClick, active=false }) {
  if (!genre) return null;
  return (
    <span onClick={onClick} style={{
      display:"inline-block",fontSize:small?10:11,
      background:active?"#C9A03030":"#2A1C0E",
      color:active?"#C9A030":"#9A7A50",
      border:`1px solid ${active?"#C9A03060":"#4A3020"}`,
      borderRadius:20,padding:small?"1px 8px":"2px 10px",
      letterSpacing:.4,cursor:onClick?"pointer":"default",transition:"all .15s",
      whiteSpace:"nowrap"
    }}>{genre}</span>
  );
}

function CoverImg({ url, color, size=60 }) {
  const [err, setErr] = useState(false);
  if (url && !err) return (
    <img src={url} onError={()=>setErr(true)}
      style={{width:size,height:size*1.4,objectFit:"cover",borderRadius:4,
        boxShadow:"2px 3px 10px rgba(0,0,0,.5)",flexShrink:0}} alt="cover"/>
  );
  return (
    <div style={{width:size,height:size*1.4,borderRadius:4,background:color||"#4A3020",
      flexShrink:0,boxShadow:"2px 3px 10px rgba(0,0,0,.4)",
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38}}>📘</div>
  );
}

function Countdown({ startDate }) {
  const { daysLeft, progress, overdue, target } = countdown(startDate);
  const col = cdColor(daysLeft);
  const fmt = target.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  return (
    <div style={{marginTop:14,background:"#160E0580",borderRadius:10,padding:"12px 16px",border:"1px solid #3A2A18"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:11,letterSpacing:2,color:"#8A6A40",textTransform:"uppercase"}}>
          {overdue?"Overdue!":"Reading Deadline"}
        </span>
        <span style={{fontSize:12,color:col,fontWeight:600}}>
          {overdue?`${Math.abs(daysLeft)}d overdue`:`${daysLeft} day${daysLeft!==1?"s":""} left`}
          <span style={{color:"#6A4A30",fontWeight:400}}> · {fmt}</span>
        </span>
      </div>
      <div style={{background:"#2A1C0E",borderRadius:4,height:5,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${progress*100}%`,background:col,
          borderRadius:4,transition:"width .5s"}}/>
      </div>
      {overdue && <div style={{fontSize:11,color:"#C4303A",marginTop:6,fontStyle:"italic"}}>
        Don't worry — quality over speed! 📚</div>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]         = useState(null);
  const [tab, setTab]           = useState("home");
  const [data, setData]         = useState(DEFAULT);
  const [loading, setLoading]   = useState(true);
  const [syncing, setSyncing]   = useState(false);
  const [syncErr, setSyncErr]   = useState(false);
  const [showAdd, setShowAdd]   = useState(false);
  const [showRead, setShowRead] = useState(false);
  const [genreFilter, setGenreFilter] = useState("All");
  const pollRef = useRef(null);
  const saving  = useRef(false);

  // Load on mount; re-sync from cloud when window regains focus
  useEffect(()=>{
    async function load() {
      try {
        const d = await window.cloudStorage.read();
        if (d) setData(d);
      } catch(e) { console.warn("Load error:", e); }
      setLoading(false);
    }
    load();

    // Only re-fetch on focus (no interval — saves bandwidth & Netlify credits)
    const onFocus = async () => {
      if (saving.current) return;
      try {
        const d = await window.cloudStorage.read();
        if (d) { setData(d); setSyncErr(false); }
      } catch { setSyncErr(true); }
    };
    window.addEventListener("focus", onFocus);
    return () => window.removeEventListener("focus", onFocus);
  },[]);

  const save = useCallback(async nd=>{
    saving.current = true; setSyncing(true); setData(nd);
    // localStorage write happens inside cloudStorage.write before any cloud call
    // so data is always safe locally even if cloud fails
    try { await window.cloudStorage.write(nd); setSyncErr(false); }
    catch(e) {
      // Cloud sync failed but data is saved locally — show warning, don't block
      setSyncErr(true);
      console.error("Cloud sync failed (data saved locally):", e.message);
    }
    setSyncing(false); saving.current = false;
  },[]);

  // Actions
  const addToQueue   = (title,author,genre,coverUrl)=>save({...data,queue:[...data.queue,{id:Date.now(),title,author,genre,coverUrl,suggestedBy:user,addedDate:new Date().toISOString()}]});
  const removeQueue  = id=>save({...data,queue:data.queue.filter(b=>b.id!==id)});
  const makeCurrent  = book=>{ save({...data,currentRead:{...book,startDate:new Date().toISOString()},queue:data.queue.filter(b=>b.id!==book.id)}); setTab("current"); };
  const markRead     = (rating,note)=>{ if(!data.currentRead)return; save({...data,currentRead:null,bookshelf:[{...data.currentRead,finishedDate:new Date().toISOString(),ratings:{...data.currentRead.ratings,[user]:rating},notes:{...(data.currentRead.notes||{}),[user]:note}},...data.bookshelf]}); setShowRead(false); };
  const updateRating = (id,r)=>save({...data,bookshelf:data.bookshelf.map(b=>b.id===id?{...b,ratings:{...b.ratings,[user]:r}}:b)});
  const updateNote   = (id,n)=>save({...data,bookshelf:data.bookshelf.map(b=>b.id===id?{...b,notes:{...(b.notes||{}),[user]:n}}:b)});

  // Genre list from queue
  const queueGenres = ["All",...new Set(data.queue.map(b=>b.genre).filter(Boolean))];
  const filteredQueue = genreFilter==="All" ? data.queue : data.queue.filter(b=>b.genre===genreFilter);

  const col = user ? MC[user] : { bg: "#C9A030" };

  // ── Main app ─────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1C120A,#0E0802)"}}>

      {/* Header */}
      <div style={{borderBottom:"1px solid #3A2A18",padding:"12px 20px",display:"flex",
        alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,
        background:"rgba(14,8,2,0.92)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <button onClick={()=>setUser(null)} style={{display:"flex",alignItems:"center",gap:10,
          background:"transparent",border:"none",cursor:"pointer",padding:0}}>
          <span style={{fontSize:18}}>📖</span>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:5}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,fontStyle:"italic",color:"#C9A030"}}>The</span>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:"#F2E8D0",letterSpacing:-.5}}>THIRD CHAPTER</span>
            </div>
            <div style={{fontSize:9,letterSpacing:2.5,color:"#5A3A20",textTransform:"uppercase"}}>Book Club</div>
          </div>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {syncing && <span style={{fontSize:10,color:"#6A4A30",animation:"pulse 1s infinite"}}>syncing…</span>}
          {syncErr && <span style={{fontSize:10,color:"#C43030",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block",verticalAlign:"middle",cursor:"pointer"}} title={window.cloudStorage.lastErr||"sync failed"}>⚠️ sync failed</span>}
          {window.cloudStorage.isCloud && !syncing && !syncErr && <span style={{fontSize:10,color:"#4A7C59",opacity:.7}}>☁️</span>}
          {user ? (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6,background:`${col.bg}1E`,
                border:`1px solid ${col.bg}45`,borderRadius:18,padding:"4px 10px"}}>
                <MemberAvatar name={user} size={20}/>
                <span style={{fontSize:12,color:col.bg,fontWeight:600}}>{user}</span>
              </div>
              <button onClick={()=>{setUser(null);setTab("home");}} style={{background:"transparent",border:"1px solid #3A2A18",
                color:"#7A5A30",borderRadius:8,padding:"4px 9px",cursor:"pointer",fontSize:11}}>Switch</button>
            </div>
          ) : (
            <button onClick={()=>setTab("home")} style={{background:"#C9A03022",border:"1px solid #C9A03055",
              color:"#C9A030",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
              Who's reading? →
            </button>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #3A2A18",padding:"0 16px",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"transparent",border:"none",
            borderBottom:tab===t.id?"2px solid #C9A030":"2px solid transparent",
            color:tab===t.id?"#F2E8D0":"#6A4A28",padding:"12px 15px",cursor:"pointer",
            fontSize:13,fontWeight:tab===t.id?600:400,display:"flex",alignItems:"center",gap:5,
            transition:"color .2s",marginBottom:-1,whiteSpace:"nowrap"}}>
            <span style={{fontSize:12}}>{t.icon}</span> {t.label}
            {t.id==="queue"&&data.queue.length>0&&
              <span style={{background:"#C9A030",color:"#1C120A",borderRadius:9,fontSize:10,padding:"0px 5px",fontWeight:700}}>{data.queue.length}</span>}
            {t.id==="bookshelf"&&data.bookshelf.length>0&&
              <span style={{background:"#4A7C59",color:"#E8F3EC",borderRadius:9,fontSize:10,padding:"0px 5px",fontWeight:700}}>{data.bookshelf.length}</span>}
          </button>
        ))}
      </div>

      {/* Content */}
      {loading ? (
        <div style={{padding:60,textAlign:"center",color:"#7A5A30",fontSize:15}}>Loading your library…</div>
      ) : (
        <div style={{padding:20,maxWidth:680,margin:"0 auto"}}>

          {/* HOME */}
          {tab==="home" && <HomeTab data={data} currentUser={user} setUser={setUser}/>}

          {/* NOW READING */}
          {tab==="current" && (
            data.currentRead ? (
              <div className="fade-in">
                <div style={{background:"linear-gradient(135deg,#2E1E0C,#1E1408)",border:"1px solid #6A4A20",
                  borderRadius:16,padding:24,marginBottom:16}}>
                  <div style={{fontSize:10,letterSpacing:4,color:"#C9A030",textTransform:"uppercase",marginBottom:14}}>✦ Currently Reading</div>
                  <div style={{display:"flex",gap:18,marginBottom:16}}>
                    <CoverImg url={data.currentRead.coverUrl} color={col.bg} size={76}/>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,
                        color:"#F2E8D0",lineHeight:1.2,marginBottom:6}}>{data.currentRead.title}</div>
                      <div style={{fontSize:14,color:"#9A7A50",marginBottom:8}}>{data.currentRead.author}</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:11,color:MC[data.currentRead.suggestedBy]?.bg||"#C9A030"}}>
                          Suggested by {data.currentRead.suggestedBy}</span>
                        {data.currentRead.genre && <GenrePill genre={data.currentRead.genre} small/>}
                      </div>
                    </div>
                  </div>

                  {/* Countdown */}
                  {data.currentRead.startDate && <Countdown startDate={data.currentRead.startDate}/>}

                  <div style={{display:"flex",gap:9,flexWrap:"wrap",marginTop:14}}>
                    <button onClick={()=>{ if(!user){setTab("home");return;} setShowRead(true);}} style={{background:"#4A7C59",border:"none",color:"#E8F3EC",
                      borderRadius:10,padding:"10px 18px",cursor:"pointer",fontSize:13,fontWeight:700}}>🎉 We Finished It!</button>
                    <button onClick={()=>save({...data,currentRead:null,queue:[data.currentRead,...data.queue]})}
                      style={{background:"transparent",border:"1px solid #5A3A20",color:"#9A7A50",
                        borderRadius:10,padding:"9px 15px",cursor:"pointer",fontSize:13}}>← Back to Queue</button>
                  </div>
                </div>
                <div style={{background:"#221508",border:"1px solid #3A2A18",borderRadius:12,padding:"14px 17px"}}>
                  <div style={{fontSize:10,letterSpacing:3,color:"#7A5A30",textTransform:"uppercase",marginBottom:10}}>Reading With</div>
                  <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                    {MEMBERS.map(m=>(
                      <div key={m} style={{display:"flex",alignItems:"center",gap:7}}>
                        <MemberAvatar name={m} size={28}/>
                        <span style={{fontSize:13,color:m===user?"#F2E8D0":"#8A6A40",fontWeight:m===user?600:400}}>{m}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            ) : (
              <div className="fade-in" style={{textAlign:"center",padding:"56px 20px"}}>
                <div style={{fontSize:48,marginBottom:12}}>📭</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:"#8A6A40",marginBottom:7}}>Nothing selected yet</div>
                <div style={{fontSize:14,color:"#5A3A20",marginBottom:22}}>Promote a book from the queue to start reading</div>
                <button onClick={()=>setTab("queue")} style={{background:"#C9A030",border:"none",color:"#1C120A",
                  borderRadius:10,padding:"11px 22px",cursor:"pointer",fontSize:14,fontWeight:700}}>Browse the Queue →</button>
              </div>
            )
          )}

          {/* QUEUE */}
          {tab==="queue" && (
            <div className="fade-in">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#F2E8D0"}}>Up Next</div>
                  <div style={{fontSize:12,color:"#6A4A30",marginTop:2}}>{data.queue.length} book{data.queue.length!==1?"s":""} waiting</div>
                </div>
                <button onClick={()=>{ if(!user){setTab("home");return;} setShowAdd(true);}} style={{background:"#C9A030",border:"none",color:"#1C120A",
                  borderRadius:10,padding:"8px 15px",cursor:"pointer",fontSize:13,fontWeight:700}}>+ Add Book</button>
              </div>

              {/* Genre filter */}
              {queueGenres.length > 1 && (
                <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
                  {queueGenres.map(g=>(
                    <GenrePill key={g} genre={g} active={genreFilter===g} onClick={()=>setGenreFilter(g)}/>
                  ))}
                </div>
              )}

              {filteredQueue.length===0 ? (
                <div style={{textAlign:"center",padding:"44px 20px"}}>
                  <div style={{fontSize:44,marginBottom:10}}>📋</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#8A6A40",marginBottom:6}}>
                    {genreFilter==="All"?"Queue is empty":`No ${genreFilter} books in the queue`}</div>
                  {genreFilter!=="All"
                    ? <button onClick={()=>setGenreFilter("All")} style={{background:"transparent",border:"1px solid #5A3A20",color:"#9A7A50",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Show All</button>
                    : <div style={{fontSize:13,color:"#5A3A20"}}>Add some books you'd love to read together</div>}
                </div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {filteredQueue.map(b=><QueueCard key={b.id} book={b} onMakeCurrent={makeCurrent} onRemove={removeQueue}/>)}
                </div>
              )}
            </div>
          )}

          {/* BOOKSHELF */}
          {tab==="bookshelf" && (
            <div className="fade-in">
              <div style={{marginBottom:16}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#F2E8D0"}}>Bookshelf</div>
                <div style={{fontSize:12,color:"#6A4A30",marginTop:2}}>{data.bookshelf.length} book{data.bookshelf.length!==1?"s":""} finished together</div>
              </div>
              {data.bookshelf.length===0 ? (
                <div style={{textAlign:"center",padding:"44px 20px"}}>
                  <div style={{fontSize:44,marginBottom:10}}>🏛️</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#8A6A40",marginBottom:6}}>Your story begins here</div>
                  <div style={{fontSize:13,color:"#5A3A20"}}>Finished books with ratings and notes will live here</div>
                </div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {data.bookshelf.map(b=><ShelfCard key={b.id} book={b} currentUser={user} onRate={updateRating} onSaveNote={updateNote}/>)}
                </div>
              )}
            </div>
          )}

        </div>
      )}

      {showAdd  && <AddModal currentUser={user} onAdd={addToQueue} onClose={()=>setShowAdd(false)}/>}
      {showRead && data.currentRead && <MarkReadModal book={data.currentRead} currentUser={user} onConfirm={markRead} onClose={()=>setShowRead(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
